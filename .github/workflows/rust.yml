name: Rust

on:
  repository_dispatch:
    types: [build]
  workflow_dispatch:
    inputs:
      name:
        description: 'Run?'
        required: true
        default: 'YES!'
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows-64:
    name: Build Windows 64-bit (Ninja + MinGW via pacman)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
  
      - name: Install MSYS2
        run: |
          choco install msys2 -y
          refreshenv
  
      - name: Update pacman and install toolchains
        shell: msys2 {0}
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            mingw-w64-x86_64-gcc \
            mingw-w64-x86_64-ninja \
            mingw-w64-x86_64-rust \
            make
  
      - name: Set CMake generator to Ninja
        run: echo "CMAKE_GENERATOR=Ninja" >> $env:GITHUB_ENV
  
      - name: Build 64-bit GNU target
        shell: msys2 {0}
        run: |
          cargo build --release --target x86_64-pc-windows-gnu
  
      - uses: actions/upload-artifact@v4
        with:
          name: GM8Emulator-windows-x64
          path: target/x86_64-pc-windows-gnu/release/*.exe
  

          
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            git build-essential libasound2-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libgtk-3-dev libssl-dev libxcb-xinput-dev \
            libxcb-xkb-dev libxcb-cursor-dev default-jre-headless cmake g++ \
            libudev-dev curl wget libpulse-dev libjack-dev zip
          sudo apt-get clean
      - uses: actions/setup-node@v4
        with:
          node-version: '10.x'
      - uses: hecrj/setup-rust-action@master
        with:
          rust-version: stable
      - name: Rust set up
        run: |
          rustup self update
          rustup update
          git submodule update --init --recursive
      - name: Build Linux release
        run: |
          cargo build --release
          mkdir -p archive
          cp target/release/gm8emulator archive
          find . -maxdepth 3
      - uses: actions/upload-artifact@v4
        with:
          name: GM8Emulator-linux
          path: archive

  collect:
    name: Collect and package artifacts
    runs-on: ubuntu-latest
    needs: [build-windows-64, build-linux]
    steps:
      - uses: actions/checkout@v4
      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: GM8Emulator-windows-x64
          path: artifacts/windows-x64
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: GM8Emulator-linux
          path: artifacts/linux
      - name: Inspect downloaded artifacts
        run: |
          echo "Windows x64 files:"
          ls -la artifacts/windows-x64 || true
          echo "Linux files:"
          ls -la artifacts/linux || true
      - name: Create combined release zip
        run: |
          mkdir -p release
          cp artifacts/windows-x64/* release/ || true
          cp artifacts/linux/* release/ || true
          cd release
          zip -r ../GM8Emulator-all-platforms.zip . || true
          cd ..
      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: GM8Emulator-all
          path: GM8Emulator-all-platforms.zip
