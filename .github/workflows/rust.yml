name: Rust

on:
  repository_dispatch:
    types: [build]
  workflow_dispatch:
    inputs:
      name:
        description: 'Run?'
        required: true
        default: 'YES!'
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v4
      - uses: hecrj/setup-rust-action@master
        with:
          rust-version: stable
      - uses: actions/setup-node@v4
        with:
          node-version: '10.x'
      - run: npm install -g yarn
      - name: Rust set up
        shell: pwsh
        env:
          LIBFFI_SYS_STATIC: 1
        run: |
          $env:Path += ";$env:USERPROFILE\.cargo\bin"
          rustup self update
          rustup update
          rustup install nightly
          git submodule update --init --recursive
          rustup target add i686-pc-windows-msvc --toolchain=nightly
          cd "gm8emulator-wow64"
          cargo +nightly build --release
          Move-Item -Path target/i686-pc-windows-msvc/release/gm8emulator-wow64.exe -Destination .
          cd ..
      - name: Build the GM8Emulator.zip artifact
        shell: pwsh
        env:
          LIBFFI_SYS_STATIC: 1
        run: cargo +nightly build --release
      - name: Archive bin
        shell: pwsh
        run: |
          Move-Item -Path gm8emulator-wow64/gm8emulator-wow64.exe -Destination target/release
          cd target/release
          7z -tzip a GM8Emulator-windows.zip control-panel.exe gm8emulator-wow64.exe gm8decompiler.exe gm8emulator.exe -mx0 | grep ing || $true
          cd ../..
          Move-Item -Path target/release/GM8Emulator-windows.zip -Destination .
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: GM8Emulator-windows
          path: GM8Emulator-windows.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            git \
            build-essential \
            libasound2-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libgtk-3-dev \
            libssl-dev \
            libxcb-xinput-dev \
            libxcb-xkb-dev \
            libxcb-cursor-dev \
            default-jre-headless \
            cmake \
            g++ \
            libudev-dev \
            curl \
            wget \
            libpulse-dev \
            libjack-dev \
            zip
          sudo apt-get clean
      - uses: actions/setup-node@v4
        with:
          node-version: '10.x'
      - uses: hecrj/setup-rust-action@master
        with:
          rust-version: stable
      - name: Rust set up
        run: |
          rustup self update
          rustup update
          git submodule update --init --recursive
      - name: Build Linux release
        run: |
          cargo build --release
          mkdir -p target/release/dist
          # adjust binary names/paths as needed
          cp target/release/gm8emulator target/release/dist/ || true
          cd target/release/dist
          zip -r ../../GM8Emulator-linux.zip . || true
          cd ../../..
          mv target/release/GM8Emulator-linux.zip .
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: GM8Emulator-linux
          path: GM8Emulator-linux.zip

  collect:
    name: Collect and package artifacts
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    steps:
      - uses: actions/checkout@v4
      - name: Download artifact pls
        uses: actions/download-artifact@v4
        with:
          name: GM8Emulator-windows
          path: artifacts/windows
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: GM8Emulator-linux
          path: artifacts/linux
      - name: Inspect downloaded artifacts
        run: |
          echo "Windows files:"
          ls -la artifacts/windows || true
          echo "Linux files:"
          ls -la artifacts/linux || true
      - name: Create combined release zip
        run: |
          mkdir -p release
          cp artifacts/windows/* release/ || true
          cp artifacts/linux/* release/ || true
          cd release
          zip -r ../GM8Emulator-all-platforms.zip . || true
          cd ..
      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: GM8Emulator-all
          path: GM8Emulator-all-platforms.zip
