name: Rust

on:
  repository_dispatch:
    types: [build]
  workflow_dispatch:
    inputs:
      name:
        description: 'Run?'
        required: true
        default: 'YES!'
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows-64:
    name: Build Windows 64-bit (MinGW)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hecrj/setup-rust-action@master
        with:
          rust-version: stable
      - name: Install MinGW
        run: choco install mingw -y
      - name: Build 64-bit GNU target
        run: |
          rustup target add x86_64-pc-windows-gnu
          cargo +nightly build --release --target x86_64-pc-windows-gnu
      - uses: actions/upload-artifact@v4
        with:
          name: GM8Emulator-windows-x64
          path: target/x86_64-pc-windows-gnu/release/*.exe

  build-windows-32:
    name: Build Windows 32-bit (MinGW)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hecrj/setup-rust-action@master
        with:
          rust-version: nightly
      - name: Install MinGW
        run: choco install mingw -y
      - name: Install i686 GNU target + rust-src
        run: |
          rustup target add i686-pc-windows-gnu --toolchain nightly
          rustup component add rust-src --toolchain nightly
      - name: Build 32-bit GNU target
        run: cargo +nightly build -Zbuild-std --target i686-pc-windows-gnu --release
      - uses: actions/upload-artifact@v4
        with:
          name: GM8Emulator-windows-x86
          path: target/i686-pc-windows-gnu/release/*.exe
  

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            git build-essential libasound2-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libgtk-3-dev libssl-dev libxcb-xinput-dev \
            libxcb-xkb-dev libxcb-cursor-dev default-jre-headless cmake g++ \
            libudev-dev curl wget libpulse-dev libjack-dev zip
          sudo apt-get clean
      - uses: actions/setup-node@v4
        with:
          node-version: '10.x'
      - uses: hecrj/setup-rust-action@master
        with:
          rust-version: stable
      - name: Rust set up
        run: |
          rustup self update
          rustup update
          git submodule update --init --recursive
      - name: Build Linux release
        run: |
          cargo build --release
          mkdir -p archive
          cp target/release/gm8emulator archive
          find . -maxdepth 3
      - uses: actions/upload-artifact@v4
        with:
          name: GM8Emulator-linux
          path: archive

  collect:
    name: Collect and package artifacts
    runs-on: ubuntu-latest
    needs: [build-windows-64, build-windows-32, build-linux]
    steps:
      - uses: actions/checkout@v4
      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: GM8Emulator-windows-x64
          path: artifacts/windows-x64
      - name: Download Windows x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: GM8Emulator-windows-x86
          path: artifacts/windows-x86
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: GM8Emulator-linux
          path: artifacts/linux
      - name: Inspect downloaded artifacts
        run: |
          echo "Windows x64 files:"
          ls -la artifacts/windows-x64 || true
          echo "Windows x86 files:"
          ls -la artifacts/windows-x86 || true
          echo "Linux files:"
          ls -la artifacts/linux || true
      - name: Create combined release zip
        run: |
          mkdir -p release
          cp artifacts/windows-x64/* release/ || true
          cp artifacts/windows-x86/* release/ || true
          cp artifacts/linux/* release/ || true
          cd release
          zip -r ../GM8Emulator-all-platforms.zip . || true
          cd ..
      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: GM8Emulator-all
          path: GM8Emulator-all-platforms.zip
